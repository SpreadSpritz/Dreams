        /* Apple HIG Dark Mode Color Palette & Typography */

        .header-buttons { display: flex; align-items: center; gap: 12px; }

        .btn-small { background-color: #2C2C2E; color: var(--text-primary); border: none; padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: 600; font-family: var(--font-stack); cursor: pointer; }
        .btn-small.logout { color: var(--error-red); }
        
        /* Modern Icons */
        .bell-container { position: relative; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .btn-icon-top { background: transparent; border: none; color: var(--text-primary); padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
        .btn-icon-top:active { opacity: 0.6; }
        .notification-dot { display: none; position: absolute; top: 0px; right: 2px; width: 10px; height: 10px; background-color: var(--error-red); border-radius: 50%; border: 2px solid var(--bg-color); }

        /* iOS Segmented Control */
        .segmented-control { display: flex; background-color: var(--card-bg); border-radius: 8px; padding: 2px; }
        .segment-btn { flex: 1; text-align: center; padding: 6px 0; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--text-primary); background: transparent; border: none; cursor: pointer; transition: background 0.2s; }

        /* Screens */
        #authScreen { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100dvh; background-color: var(--bg-color); 
            z-index: 100; overflow: hidden; 
        }
        #appScreen { display: none; }

        /* Auth Screen */
        .auth-container { display: flex; flex-direction: column; justify-content: center; padding: 0 20px; height: calc(100% - 90px); }
        .auth-title { font-size: 34px; font-weight: 700; margin-bottom: 30px; text-align: center; }
        .auth-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-auth { flex: 1; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; font-family: var(--font-stack); }
        .btn-auth.login { background-color: var(--accent-blue); color: white; }

        .auth-error { color: var(--error-red); text-align: center; margin-top: 15px; font-size: 14px; font-weight: 500; min-height: 20px; word-wrap: break-word; }

        /* Dream List Container */
        .dream-list { padding: 20px; padding-bottom: 120px; }
        .empty-state { text-align: center; color: var(--text-secondary); margin-top: 50px; font-size: 16px; line-height: 1.5; }

        .dream-card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 16px; cursor: pointer; }
        .dream-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .dream-title-container { flex: 1; padding-right: 10px; }
        .dream-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; word-wrap: break-word; }
        .dream-date { font-size: 13px; color: var(--text-secondary); }

        .dream-detail strong { display: block; margin-top: 12px; color: var(--text-secondary); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Bottom Detail Actions (Edit, Delete) */
        .card-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }
        .btn-action { width: 100%; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 600; font-family: var(--font-stack); cursor: pointer; }
        .btn-edit { background-color: #2C2C2E; color: var(--accent-blue); }
        .btn-delete { background-color: transparent; color: var(--error-red); border: 1px solid var(--separator); }

        /* Bottom Fixed Add Button */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; padding: 15px 20px 30px 20px; background: linear-gradient(to top, rgba(0,0,0,1) 60%, rgba(0,0,0,0)); z-index: 20; }
        .btn-add { width: 100%; background-color: var(--accent-blue); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(10, 132, 255, 0.3); }

        /* Modals */
        .modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); z-index: 30; transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }

        .modal-header h2 { margin: 0; font-size: 17px; font-weight: 600; }

        .modal-btn.save { font-weight: 600; }
        .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* Form Inputs */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; background-color: #2C2C2E; border: none; color: var(--text-primary); padding: 14px 16px; border-radius: 10px; font-size: 17px; font-family: var(--font-stack); }

        window.onload = () => {
            applyLanguage();
            const savedUser = localStorage.getItem('dreams_session_user');
            if (savedUser) { loginSuccess(savedUser); } 
            else { document.getElementById('authScreen').style.display = 'block'; document.getElementById('appScreen').style.display = 'none'; }
        };

        document.getElementById('hiddenDatePicker').addEventListener('change', (e) => {
            if (e.target.value) { document.getElementById('dreamDate').value = formatDateForDisplay(e.target.value); }
        });

        function cleanUsername(u) { return u.trim().replace(/[.#$\[\]\s]/g, '').toLowerCase(); }

        // --- CENSORSHIP LOGIC ---
        function applyCensorship(text, format = 'html') {
            if (!text) return '';
            const pattern = /\[redacted\]/gi;
            if (format === 'html') {
                return text.replace(pattern, '<span class="censored-box">[redacted]</span>');
            } else {
                return text.replace(pattern, '██████████');
            }
        }

        window.performRegister = () => {
            const rawU = document.getElementById('authUsername').value;
            const p = document.getElementById('authPassword').value;
            const err = document.getElementById('authErrorMsg');
            const u = cleanUsername(rawU);

            if (!u || p.length < 6) { err.innerText = tDict[currentLang].errEmpty; return; }
            err.innerText = "Loading...";
            
            get(child(dbRef, `users/${u}/info`)).then((snapshot) => {
                if (snapshot.exists()) { err.innerText = tDict[currentLang].errReg; } 
                else { set(ref(db, `users/${u}/info`), { password: btoa(p) }).then(() => { loginSuccess(u); }).catch(e => { err.innerText = tDict[currentLang].errDb; }); }
            }).catch(e => { err.innerText = tDict[currentLang].errDb; });
        };

        window.performLogin = () => {
            const rawU = document.getElementById('authUsername').value;
            const p = document.getElementById('authPassword').value;
            const err = document.getElementById('authErrorMsg');
            const u = cleanUsername(rawU);

            if (!u || !p) { err.innerText = tDict[currentLang].errEmpty; return; }
            err.innerText = "Loading...";
            
            get(child(dbRef, `users/${u}/info`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.password === btoa(p)) { loginSuccess(u); } else { err.innerText = tDict[currentLang].errLog; }
                } else { err.innerText = tDict[currentLang].errLog; }
            }).catch(e => { err.innerText = tDict[currentLang].errDb; });
        };

        function loginSuccess(username) {
            currentUser = username;
            localStorage.setItem('dreams_session_user', username);
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authErrorMsg').innerText = '';

            const dreamsRef = ref(db, `users/${currentUser}/dreams`);
            dbListener = onValue(dreamsRef, (snapshot) => {
                const data = snapshot.val();
                dreams = data ? data :[];
                renderDreams();
                if(document.getElementById('inboxModal').classList.contains('open')) { renderInbox(); }
            });

            const inboxRef = ref(db, `users/${currentUser}/inbox`);
            inboxListener = onValue(inboxRef, (snapshot) => {
                inboxData = snapshot.val() || {};
                checkUnreadMessages();
                if(document.getElementById('inboxModal').classList.contains('open')) { renderInbox(); }
            });

            const friendsRef = ref(db, `users/${currentUser}/friends`);
            friendsListener = onValue(friendsRef, (snapshot) => {
                friendsData = snapshot.val() || {};
                if(document.getElementById('friendsModal').classList.contains('open')) { renderFriendsList(); }
                if(document.getElementById('selectFriendModal').classList.contains('open')) { renderSelectFriendsList(); }
            });

            const publicRef = ref(db, `publicDreams`);
            publicListener = onValue(publicRef, (snapshot) => {
                publicDreamsData = snapshot.val() || {};
                if(currentTab === 'browse') renderDreams();
            });
        }

        window.performLogout = () => {
            if (dbListener) dbListener();
            if (inboxListener) inboxListener();
            if (friendsListener) friendsListener();
            if (publicListener) publicListener();
            localStorage.removeItem('dreams_session_user');
            currentUser = null; dreams =[]; inboxData = {}; friendsData = {}; publicDreamsData = {};
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('appScreen').style.display = 'none';
        };

        // --- BROWSE LOGIC (PUBBLICAZIONE) ---
        window.openPublishToggleModal = (event, index) => {
            event.stopPropagation();
            dreamToPublishIndex = index;
            const dream = dreams[index];
            const t = tDict[currentLang];
            const isPublic = dream.isPublic;

            document.getElementById('pubConfirmTitle').innerText = isPublic ? t.confirmPrivTitle : t.confirmPubTitle;
            document.getElementById('pubConfirmMsg').innerText = isPublic ? t.confirmPrivMsg : t.confirmPubMsg;
            document.getElementById('pubConfirmBtnAction').innerText = isPublic ? t.makePrivateBtn : t.publishBtn;
            document.getElementById('pubConfirmBtnAction').style.color = isPublic ? "var(--error-red)" : "var(--accent-blue)";
            
            document.getElementById('publishConfirmModal').classList.add('open');
        };

        window.closePublishModal = () => {
            document.getElementById('publishConfirmModal').classList.remove('open');
            dreamToPublishIndex = -1;
        };

        window.executePublishToggle = () => {
            const index = dreamToPublishIndex;
            const dream = dreams[index];
            const dreamKey = `${currentUser}_${index}`;

            if (dream.isPublic) {
                // Diventa privato
                dream.isPublic = false;
                remove(ref(db, `publicDreams/${dreamKey}`));
            } else {
                // Diventa pubblico
                dream.isPublic = true;
                const payload = { ...dream, author: currentUser, timestamp: Date.now() };
                set(ref(db, `publicDreams/${dreamKey}`), payload);
            }
            saveToFirebase();
            closePublishModal();
        };

        // --- RUBRICA AMICI ---
        window.openFriendsModal = () => { 
            document.getElementById('friendsModal').classList.add('open'); 
            renderFriendsList();
        };
        window.closeFriendsModal = () => { document.getElementById('friendsModal').classList.remove('open'); };

        window.addFriend = () => {
            const rawU = document.getElementById('friendUsernameInput').value;
            const u = cleanUsername(rawU);
            const d = document.getElementById('friendDisplayNameInput').value.trim();
            if (!u || !d) return;

            const btn = document.getElementById('btnAddFriendAction');
            const ogText = btn.innerText;
            btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;

            set(ref(db, `users/${currentUser}/friends/${u}`), {
                username: u,
                displayName: d
            }).then(() => {
                btn.innerHTML = ogText; btn.disabled = false;
                document.getElementById('friendUsernameInput').value = '';
                document.getElementById('friendDisplayNameInput').value = '';
            }).catch(() => { btn.innerHTML = ogText; btn.disabled = false; });
        };

        window.removeFriend = (u) => { remove(ref(db, `users/${currentUser}/friends/${u}`)); };

        function renderFriendsList() {
            const t = tDict[currentLang];
            const container = document.getElementById('friendsListContainer');
            container.innerHTML = '';
            const keys = Object.keys(friendsData);

            if (keys.length === 0) {
                container.innerHTML = `<div class="empty-state" style="margin-top:20px;">${t.noFriends}</div>`;
                return;

            keys.forEach(k => {
                const f = friendsData[k];

                card.className = 'dream-card';
                card.style.display = 'flex'; card.style.justifyContent = 'space-between'; card.style.alignItems = 'center'; card.style.padding = '12px 16px';
                
                card.innerHTML = `
                    <div>
                        <div class="dream-title" style="margin-bottom:2px;">${escapeHTML(f.displayName)}</div>
                        <div class="dream-date">@${escapeHTML(f.username)}</div>
                    </div>
                    <button class="btn-action btn-delete" style="width:auto; padding:8px 12px; margin:0;" onclick="removeFriend('${k}')">${t.removeFriend}</button>
                `;
                container.appendChild(card);
            });
        }

        window.openSelectFriendModal = () => { 
            document.getElementById('selectFriendModal').classList.add('open'); 
            renderSelectFriendsList();
        };
        window.closeSelectFriendModal = () => { document.getElementById('selectFriendModal').classList.remove('open'); };

        window.selectFriendForSend = (u) => {
            document.getElementById('sendRecipient').value = u;
            closeSelectFriendModal();
        };

        function renderSelectFriendsList() {
            const t = tDict[currentLang];
            const container = document.getElementById('selectFriendsList');
            container.innerHTML = '';
            const keys = Object.keys(friendsData);

            if (keys.length === 0) {
                container.innerHTML = `<div class="empty-state">${t.noFriends}</div>`;
                return;
            }

            keys.forEach(k => {
                const f = friendsData[k];
                const card = document.createElement('div');
                card.className = 'dream-card';
                card.style.padding = '16px';
                card.onclick = () => selectFriendForSend(f.username);
                
                card.innerHTML = `
                    <div class="dream-title" style="margin-bottom:2px;">${escapeHTML(f.displayName)}</div>
                    <div class="dream-date">@${escapeHTML(f.username)}</div>
                `;
                container.appendChild(card);
            });
        }

        // --- INBOX ---
        function checkUnreadMessages() {
            let hasUnread = false;
            for (let key in inboxData) { if (!inboxData[key].isRead) hasUnread = true; }
            document.getElementById('notifDot').style.display = hasUnread ? 'block' : 'none';
        }

        window.openInboxModal = () => {
            let updates = {}; let changed = false;
            for (let key in inboxData) {
                if (!inboxData[key].isRead) { updates[`${key}/isRead`] = true; changed = true; }
            }
            if (changed) { update(ref(db, `users/${currentUser}/inbox`), updates); }
            document.getElementById('inboxModal').classList.add('open');
            renderInbox();
        };

        window.closeInboxModal = () => { document.getElementById('inboxModal').classList.remove('open'); };
        window.toggleInboxDetail = (key) => { const detailView = document.getElementById(`inbox-detail-${key}`); detailView.style.display = detailView.style.display === 'block' ? 'none' : 'block'; };
        window.deleteInboxItem = (event, key) => { event.stopPropagation(); remove(ref(db, `users/${currentUser}/inbox/${key}`)); };

        window.openSendModal = (event, index) => {
            event.stopPropagation(); dreamToSendIndex = index;
            document.getElementById('sendRecipient').value = '';
            document.getElementById('sendModalOverlay').classList.add('open');
        };

        window.closeSendModal = () => { document.getElementById('sendModalOverlay').classList.remove('open'); dreamToSendIndex = -1; };

        window.executeSendDream = () => {
            const recipientRaw = document.getElementById('sendRecipient').value;
            const recipient = cleanUsername(recipientRaw);
            if (!recipient) return;

            const btn = document.getElementById('btnSendConfirm');
            const originalText = btn.innerText;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            get(child(dbRef, `users/${recipient}/info`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const dreamData = { ...dreams[dreamToSendIndex] };
                    if (!dreamData.dreamer) dreamData.dreamer = currentUser;

                    const inboxPayload = { sender: currentUser, dream: dreamData, timestamp: Date.now(), isRead: false };
                    push(ref(db, `users/${recipient}/inbox`), inboxPayload).then(() => {
                        btn.innerHTML = originalText; btn.disabled = false;
                        alert(tDict[currentLang].sentSuccess); closeSendModal();
                    }).catch(() => { btn.innerHTML = originalText; btn.disabled = false; });
                } else { 
                    btn.innerHTML = originalText; btn.disabled = false;
                    alert(tDict[currentLang].userNotFound); 
                }
            }).catch(() => { btn.innerHTML = originalText; btn.disabled = false; });
        };

        // --- SISTEMA DI DOWNLOAD TESTUALE ---
        function generateTxtContent(dream, t, senderName = null) {
            const author = dream.dreamer || (senderName ? senderName : currentUser);
            let metaLine = `${t.authorText} ${author}\n`;
            if (senderName && senderName !== author) { metaLine += `${t.fromText} ${senderName}\n`; }
            
            // Applica censura nel download (testo semplice)
            const dTitle = applyCensorship(dream.title, 'text');
            const dLoc = applyCensorship(dream.location, 'text');
            const dChars = applyCensorship(dream.characters, 'text');
            const dStory = applyCensorship(dream.story, 'text');

            return `========================================\n${(dTitle || '').toUpperCase()}\n${t.lblDate}: ${dream.date || ''}\n${metaLine}========================================\n\n${t.locLabel}:\n${dLoc || t.locUnknown}\n\n${t.charLabel}:\n${dChars || t.charNone}\n\n${t.storyLabel}:\n${dStory || t.storyEmpty}\n\n========================================\nExported from Dreams App`;
        }

        function downloadBlob(textContent, title) {
            const blob = new Blob(["\ufeff" + textContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url;
            const safeTitle = (title || 'dream').replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
            a.download = `dream_${safeTitle}.txt`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        window.downloadDreamToFile = (event, index, source = 'personal') => {
            event.stopPropagation();
            let dream;
            if (source === 'browse') {
                dream = Object.values(publicDreamsData).reverse()[index];
            } else {
                dream = dreams[index];
            }
            const textContent = generateTxtContent(dream, tDict[currentLang], null);
            downloadBlob(textContent, dream.title);
        };

        window.downloadInboxDreamToFile = (event, key) => {
            event.stopPropagation();
            const item = inboxData[key];
            const textContent = generateTxtContent(item.dream, tDict[currentLang], item.sender);
            downloadBlob(textContent, item.dream.title);
        };

        // --- GESTIONE PREFERITI ---
        window.toggleInboxFavorite = (event, key) => {
            event.stopPropagation();
            const existingIndex = dreams.findIndex(d => d.originalInboxKey === key);
            if (existingIndex > -1) { dreams.splice(existingIndex, 1); } 
            else {
                const item = inboxData[key];
                const newDream = { ...item.dream, isFavorite: true, dreamer: item.dream.dreamer || item.sender, originalInboxKey: key };
                dreams.unshift(newDream);
            }
            saveToFirebase().then(() => { renderInbox(); });
        };

        window.toggleFavorite = (event, index) => { 
            event.stopPropagation(); 
            if (dreams[index].dreamer && dreams[index].dreamer !== currentUser) { dreams.splice(index, 1); } 
            else { dreams[index].isFavorite = !dreams[index].isFavorite; }
            saveToFirebase(); 
        };

        window.toggleLanguage = () => { currentLang = currentLang === 'it' ? 'en' : 'it'; localStorage.setItem('apple_dreams_lang', currentLang); applyLanguage(); renderDreams(); renderInbox(); };
        window.switchTab = (tab) => { currentTab = tab; document.getElementById('tab-all').classList.toggle('active', tab === 'all'); document.getElementById('tab-fav').classList.toggle('active', tab === 'favorites'); document.getElementById('tab-browse').classList.toggle('active', tab === 'browse'); renderDreams(); };
        window.toggleDreamDetail = (index) => { const detailView = document.getElementById(`detail-${index}`); detailView.style.display = detailView.style.display === 'block' ? 'none' : 'block'; };

        window.openAddModal = () => {
            editingIndex = -1; document.getElementById('modalTitle').innerText = tDict[currentLang].modalNewTitle;
            document.getElementById('dreamTitle').value = ''; document.getElementById('dreamLocation').value = '';
            document.getElementById('dreamCharacters').value = ''; document.getElementById('dreamStory').value = '';
            document.getElementById('dreamDate').value = formatDateForDisplay(getTodayYYYYMMDD());
            document.getElementById('hiddenDatePicker').value = getTodayYYYYMMDD();
            document.getElementById('dreamModal').classList.add('open');
        };

        window.openEditModal = (event, index) => {
            event.stopPropagation(); editingIndex = index; const dream = dreams[index];
            document.getElementById('modalTitle').innerText = tDict[currentLang].modalEditTitle;
            document.getElementById('dreamTitle').value = dream.title; document.getElementById('dreamLocation').value = dream.location;
            document.getElementById('dreamCharacters').value = dream.characters; document.getElementById('dreamStory').value = dream.story;
            document.getElementById('dreamDate').value = dream.date || ''; document.getElementById('hiddenDatePicker').value = '';
            document.getElementById('dreamModal').classList.add('open');
        };

        window.closeModal = () => { document.getElementById('dreamModal').classList.remove('open'); };

        window.saveDream = () => {
            const title = document.getElementById('dreamTitle').value.trim();
            if (!title) { alert(tDict[currentLang].alertTitle); return; }

            const btn = document.getElementById('btnSave');
            const originalText = btn.innerText;
            btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;

            const newDream = {
                title: title, date: document.getElementById('dreamDate').value.trim() || formatDateForDisplay(getTodayYYYYMMDD()), 
                location: document.getElementById('dreamLocation').value.trim(), characters: document.getElementById('dreamCharacters').value.trim(), 
                story: document.getElementById('dreamStory').value.trim(), isFavorite: editingIndex === -1 ? false : (dreams[editingIndex].isFavorite || false),
                dreamer: editingIndex === -1 ? currentUser : (dreams[editingIndex].dreamer || currentUser),
                isPublic: editingIndex === -1 ? false : (dreams[editingIndex].isPublic || false)
            };

            if (editingIndex !== -1 && dreams[editingIndex].originalInboxKey) { newDream.originalInboxKey = dreams[editingIndex].originalInboxKey; }
            if (editingIndex === -1) { dreams.unshift(newDream); } else { dreams[editingIndex] = newDream; }
            
            saveToFirebase().then(() => { btn.innerHTML = originalText; btn.disabled = false; closeModal(); }).catch(() => { btn.innerHTML = originalText; btn.disabled = false; closeModal(); });
        };

        window.confirmDeleteDream = (event, index) => { event.stopPropagation(); dreamToDeleteIndex = index; document.getElementById('confirmModal').classList.add('open'); };
        window.closeConfirmModal = () => { document.getElementById('confirmModal').classList.remove('open'); dreamToDeleteIndex = -1; };
        window.executeDelete = () => { if (dreamToDeleteIndex > -1) { 
            const d = dreams[dreamToDeleteIndex];
            if (d.isPublic) { remove(ref(db, `publicDreams/${currentUser}_${dreamToDeleteIndex}`)); }
            dreams.splice(dreamToDeleteIndex, 1); 
            saveToFirebase(); 
            closeConfirmModal(); 
        } };

        function saveToFirebase() { if (currentUser) { return set(ref(db, `users/${currentUser}/dreams`), dreams); } return Promise.resolve(); }

        function renderInbox() {
            const t = tDict[currentLang]; const inboxList = document.getElementById('inboxList'); inboxList.innerHTML = '';

                            </button>

                        </div>
                    </div>
                    <div class="dream-detail" id="inbox-detail-${key}">
                        <strong>${t.locLabel}</strong> <p>${applyCensorship(escapeHTML(dream.location)) || t.locUnknown}</p>
                        <strong>${t.charLabel}</strong> <p>${applyCensorship(escapeHTML(dream.characters)) || t.charNone}</p>
                        <strong>${t.storyLabel}</strong> <p>${applyCensorship(escapeHTML(dream.story)).replace(/\n/g, '<br>') || t.storyEmpty}</p>
                        <div class="card-actions">
                            <button class="btn-action btn-delete" onclick="deleteInboxItem(event, '${key}')">${t.deleteInboxBtn}</button>
                        </div>
                    </div>
                `;
                inboxList.appendChild(card);
            });
        }

        function renderDreams() {
            const t = tDict[currentLang]; const dreamList = document.getElementById('dreamList'); dreamList.innerHTML = ''; 
            let hasVisibleDreams = false;

            let sourceArray = [];
            if (currentTab === 'browse') {
                sourceArray = Object.values(publicDreamsData).reverse();

                sourceArray = dreams;
            }

            if (sourceArray && sourceArray.length > 0) {
                sourceArray.forEach((dream, originalIndex) => {

                    hasVisibleDreams = true;

                    const card = document.createElement('div'); card.className = 'dream-card'; card.onclick = () => toggleDreamDetail(originalIndex);
                    const favClass = dream.isFavorite ? 'btn-fav active' : 'btn-fav'; const favIcon = dream.isFavorite ? '★' : '☆';

                    const author = dream.author || dream.dreamer || currentUser;
                    const isMine = (currentTab !== 'browse' && author === currentUser);
                    const pubColor = dream.isPublic ? 'var(--accent-green)' : 'var(--text-primary)';

                    let authorHtml = '';
                    if (author !== currentUser || currentTab === 'browse') { 
                        authorHtml = `<div class="dream-date" style="color: var(--accent-yellow); font-weight:600; margin-bottom: 5px; font-size:14px;">${t.authorText} ${escapeHTML(author)}</div>`; 
                    }

                    card.innerHTML = `

                            </div>
                            <div class="dream-icons">
                                ${isMine ? `
                                <button class="btn-icon-svg" style="color:${pubColor}" onclick="openPublishToggleModal(event, ${originalIndex})">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                                </button>
                                ` : ''}
                                <button class="btn-icon-svg" onclick="downloadDreamToFile(event, ${originalIndex}, '${currentTab === 'browse' ? 'browse' : 'personal'}')" title="${t.downloadBtn}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                </button>
                                ${currentTab !== 'browse' ? `
                                <button class="btn-icon-svg" onclick="openSendModal(event, ${originalIndex})" title="${t.sendBtn}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                </button>
                                <button class="${favClass}" onclick="toggleFavorite(event, ${originalIndex})">${favIcon}</button>
                                ` : ''}
                            </div>
                        </div>

                        <div class="dream-detail" id="detail-${originalIndex}">
                            <strong>${t.locLabel}</strong> <p>${applyCensorship(escapeHTML(dream.location)) || t.locUnknown}</p>
                            <strong>${t.charLabel}</strong> <p>${applyCensorship(escapeHTML(dream.characters)) || t.charNone}</p>
                            <strong>${t.storyLabel}</strong> <p>${applyCensorship(escapeHTML(dream.story)).replace(/\n/g, '<br>') || t.storyEmpty}</p>
                            ${isMine ? `
                            <div class="card-actions">
                                <button class="btn-action btn-edit" onclick="openEditModal(event, ${originalIndex})">${t.editBtn}</button>
                                <button class="btn-action btn-delete" onclick="confirmDeleteDream(event, ${originalIndex})">${t.deleteBtn}</button>
                            </div>` : ''}
                        </div>
                    `;
                    dreamList.appendChild(card);
                });
            }

            if (!hasVisibleDreams) { 
                let msg = t.emptyAll;
                if (currentTab === 'favorites') msg = t.emptyFav;
                else if (currentTab === 'browse') msg = t.emptyBrowse;
                dreamList.innerHTML = `<div class="empty-state">${msg}</div>`; 
            }
        }

        function applyLanguage() {
            const t = tDict[currentLang]; document.documentElement.lang = currentLang;
            document.getElementById('authTitle').innerText = t.authTitle; document.getElementById('appTitle').innerText = t.title;
            document.getElementById('authLangSwitch').innerText = t.toggleLangBtn; document.getElementById('appLangSwitch').innerText = t.toggleLangBtn;
            document.getElementById('lblAuthUser').innerText = t.authUser; document.getElementById('lblAuthPass').innerText = t.authPass;
            document.getElementById('btnAuthLog').innerText = t.authLog; document.getElementById('btnAuthReg').innerText = t.authReg;
            document.getElementById('btnLogout').innerText = t.authLogout; document.getElementById('tab-all').innerText = t.tabAll;
            document.getElementById('tab-fav').innerText = t.tabFav; document.getElementById('tab-browse').innerText = t.tabBrowse; document.getElementById('btnAddMain').innerText = t.addBtn;
            document.getElementById('btnCancel').innerText = t.modalCancel; document.getElementById('btnSave').innerText = t.modalSave;
            document.getElementById('lblDate').innerText = t.lblDate; document.getElementById('lblTitle').innerText = t.lblTitle;
            document.getElementById('lblLocation').innerText = t.locLabel; document.getElementById('lblCharacters').innerText = t.charLabel;
            document.getElementById('lblStory').innerText = t.storyLabel; document.getElementById('dreamTitle').placeholder = t.phTitle;
            document.getElementById('dreamLocation').placeholder = t.phLoc; document.getElementById('dreamCharacters').placeholder = t.phChar;
            document.getElementById('dreamStory').placeholder = t.phStory; document.getElementById('authErrorMsg').innerText = "";
            document.getElementById('confirmTitle').innerText = t.confirmTitle; document.getElementById('confirmMsg').innerText = t.confirmMsg;
            document.getElementById('btnConfirmCancel').innerText = t.confirmCancel; document.getElementById('btnConfirmDelete').innerText = t.confirmDelete;
            document.getElementById('sendModalTitle').innerText = t.sendModalTitle; document.getElementById('sendRecipient').placeholder = t.sendPh;
            document.getElementById('btnSendCancel').innerText = t.confirmCancel; document.getElementById('btnSendConfirm').innerText = t.sendConfirm;
            document.getElementById('inboxModalTitle').innerText = t.inboxTitle; document.getElementById('btnInboxClose').innerText = t.inboxClose;
            document.getElementById('dreamDate').placeholder = t.phDate;
            
            document.getElementById('friendsTitle').innerText = t.friendsTitle; document.getElementById('btnFriendsClose').innerText = t.friendsClose;
            document.getElementById('friendUsernameInput').placeholder = t.friendUserPh; document.getElementById('friendDisplayNameInput').placeholder = t.friendDisplayPh;
            document.getElementById('btnAddFriendAction').innerText = t.addFriendBtn; document.getElementById('selectFriendTitle').innerText = t.selectFriendTitle;
            document.getElementById('btnSelectFriendClose').innerText = t.friendsClose;
            if(document.getElementById('friendsModal').classList.contains('open')) renderFriendsList();
        }

        function getTodayYYYYMMDD() { const today = new Date(); const offset = today.getTimezoneOffset() * 60000; return (new Date(today - offset)).toISOString().split('T')[0]; }
        function formatDateForDisplay(dateString) { if (!dateString) return ''; const parts = dateString.split('-'); if (parts.length !== 3) return dateString; const d = new Date(parts[0], parts[1] - 1, parts[2]); if (isNaN(d)) return dateString; const dateOptions = { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' }; const locale = currentLang === 'it' ? 'it-IT' : 'en-US'; return d.toLocaleDateString(locale, dateOptions); }
        function escapeHTML(str) { if (!str) return ''; return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
